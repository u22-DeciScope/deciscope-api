services:
  postgres:
    image: postgres:16
    container_name: deciscope-core-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: deciscope
      POSTGRES_USER: deciscope
      POSTGRES_PASSWORD: deciscope
    ports:
      - "5432:5432"
    volumes:
      - deciscope_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deciscope -d deciscope"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  deciscope_postgres_data:
